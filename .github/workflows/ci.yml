name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Ensure lightningcss native binary (Linux)
        if: runner.os == 'Linux'
        run: |
          LIGHTNINGCSS_VERSION=$(node -p "require('lightningcss/package.json').version")
          npm install --no-save lightningcss-linux-x64-gnu@${LIGHTNINGCSS_VERSION}

      - name: Run lint
        run: npm run lint

      - name: Build
        run: npm run build
